display_name: "Workflow Orchestrator"
short_description: "支持阶段选择、全链路 workflow、状态机、错误处理、审批暂停/恢复、产物传递和 trace 记录。"
default_prompt: "使用 workflow-orchestrator，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "人工审批网关"
    - "跳过阻断节点"
    - "恢复 blocked workflow"
    - "高风险动作执行"
metadata:
  owner: "workflow owner"
  stage: "workflow_orchestration"
  type: "workflow_skill"
  trigger_description: "Use when the request is about 支持阶段选择、全链路 workflow、状态机、错误处理、审批暂停/恢复、产物传递和 trace 记录。；Do not use when 不直接生成阶段文档；不绕过子 skill contract。"
