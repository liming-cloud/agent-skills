{
  "node_id": "workflow-orchestrator",
  "stage": "workflow_orchestration",
  "skill_id": "workflow-orchestrator",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "workflow.yaml",
    "stage node registry",
    "StageRunRequest",
    "approval_context"
  ],
  "outputs": [
    "workflow-trace.json",
    "workflow-summary.md",
    "approval-requests.json",
    "artifact-index.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "节点 contract 匹配",
    "前置条件满足",
    "产物 schema 合规",
    "高风险动作进入审批"
  ],
  "approval_policy": {
    "required_for": [
      "人工审批网关",
      "跳过阻断节点",
      "恢复 blocked workflow",
      "高风险动作执行"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "workflow-trace.json": "artifacts/workflow-orchestrator/workflow-trace.json",
    "workflow-summary.md": "artifacts/workflow-orchestrator/workflow-summary.md",
    "approval-requests.json": "artifacts/workflow-orchestrator/approval-requests.json",
    "artifact-index.json": "artifacts/workflow-orchestrator/artifact-index.json"
  }
}
