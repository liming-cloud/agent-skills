display_name: "Frontend Development"
short_description: "基于前端设计和接口契约实施页面、组件、状态和接口联调变更。"
default_prompt: "使用 frontend-development，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "公共组件改造"
    - "前端技术栈或组件库变更"
    - "影响核心客户端流程"
metadata:
  owner: "前端开发"
  stage: "frontend_development"
  type: "stage_skill"
  trigger_description: "Use when the request is about 基于前端设计和接口契约实施页面、组件、状态和接口联调变更。；Do not use when 不修改无关页面；不绕过前端设计。"
routing:
  intent_tags:
    - "development"
    - "frontend"
    - "frontend-development"
    - "frontend_development"
    - "stage_skill"
    - "基于前端设计和接口契约实施页面"
    - "状态和接口联调变更。"
    - "组件"
  allow_implicit_invocation: true
  cost_class: "medium"
