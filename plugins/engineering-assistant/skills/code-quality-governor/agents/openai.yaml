display_name: "Code Quality Governor"
short_description: "建立 Q0-Q4 多层代码质量门禁，输出可被 CI/CD、PR、workflow 消费的结构化质量报告。"
default_prompt: "使用 code-quality-governor，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "高风险未审批变更"
    - "发布脚本变更"
    - "权限/认证/鉴权逻辑变更"
    - "支付/订单/库存/资金链路变更"
metadata:
  owner: "研发负责人"
  stage: "code_quality"
  type: "cross_cutting_skill"
  trigger_description: "Use when the request is about 建立 Q0-Q4 多层代码质量门禁，输出可被 CI/CD、PR、workflow 消费的结构化质量报告。；Do not use when 不以 LLM 判断替代 build/test/lint；不在测试失败时输出 pass。"
