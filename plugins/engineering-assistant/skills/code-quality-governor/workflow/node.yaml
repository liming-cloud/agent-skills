{
  "node_id": "code-quality-governor",
  "stage": "code_quality",
  "skill_id": "code-quality-governor",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "changed-files-report.json",
    "design-to-code-mapping.yaml",
    "self-test-report.md",
    "ci artifacts"
  ],
  "outputs": [
    "code-quality-report.md",
    "code-quality-report.html",
    "code-quality-report.json",
    "gate-decision.json",
    "ci-check-summary.md",
    "static-analysis-report.md",
    "static-analysis-report.json",
    "tool-run-summary.json",
    "improvement-candidates.yaml"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "Q0 设计一致性",
    "Q1 确定性工程检查",
    "Q1.5 Sonar/Qodana/Checkstyle 静态分析",
    "Q2 语义代码评审",
    "Q3 风险专项门禁",
    "Q4 发布前回归门禁"
  ],
  "approval_policy": {
    "required_for": [
      "高风险未审批变更",
      "发布脚本变更",
      "权限/认证/鉴权逻辑变更",
      "支付/订单/库存/资金链路变更"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "code-quality-report.md": "artifacts/code-quality-governor/code-quality-report.md",
    "code-quality-report.html": "artifacts/code-quality-governor/code-quality-report.html",
    "code-quality-report.json": "artifacts/code-quality-governor/code-quality-report.json",
    "gate-decision.json": "artifacts/code-quality-governor/gate-decision.json",
    "ci-check-summary.md": "artifacts/code-quality-governor/ci-check-summary.md",
    "static-analysis-report.md": "artifacts/code-quality-governor/static-analysis-report.md",
    "static-analysis-report.json": "artifacts/code-quality-governor/static-analysis-report.json",
    "tool-run-summary.json": "artifacts/code-quality-governor/tool-run-summary.json",
    "improvement-candidates.yaml": "artifacts/code-quality-governor/improvement-candidates.yaml"
  }
}
