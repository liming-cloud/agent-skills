{
  "node_id": "design-review",
  "stage": "design_review",
  "skill_id": "design-review",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "high-level-design.md",
    "detailed-design.md",
    "database-design.md",
    "redis-design.md",
    "mq-design.md"
  ],
  "outputs": [
    "design-review-report.md",
    "review-findings.json",
    "design-gate-decision.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "无未关闭 blocker",
    "关键专项设计齐全",
    "测试策略存在",
    "高风险审批齐全"
  ],
  "approval_policy": {
    "required_for": [
      "高风险设计放行",
      "blocker 关闭确认",
      "关键设计豁免"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "design-review-report.md": "artifacts/design-review/design-review-report.md",
    "review-findings.json": "artifacts/design-review/review-findings.json",
    "design-gate-decision.json": "artifacts/design-review/design-gate-decision.json"
  }
}
