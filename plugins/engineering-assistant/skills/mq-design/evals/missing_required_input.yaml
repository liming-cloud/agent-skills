    "team_rule_refs": [
      "M5",
      "M7",
      "M8"
    ],
    "risk_focus": [
      "消费者契约",
      "死信",
      "监控阈值"
    ],
    "forbidden_behavior": [
      "只有生产者设计就放行",
      "默认无死信"
    ]
  },
  "input": {
    "stage_run_request": {
      "run_id": "eval-run-001",
      "workflow_id": "eval-workflow",
      "node_id": "mq-design",
