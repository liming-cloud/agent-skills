{
  "node_id": "release-verification",
  "stage": "release_verification",
  "skill_id": "release-verification",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "release-plan.md",
    "release-checklist.md",
    "observability data",
    "risk_policy"
  ],
  "outputs": [
    "release-verification-report.md",
    "production-checks.json",
    "anomaly-list.md"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "核心功能验证通过",
    "错误率/延迟未触发阈值",
    "业务指标正常",
    "回滚条件未触发"
  ],
  "approval_policy": {
    "required_for": [
      "回滚操作",
      "生产验证豁免",
      "延长观察窗口"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "release-verification-report.md": "artifacts/release-verification/release-verification-report.md",
    "production-checks.json": "artifacts/release-verification/production-checks.json",
    "anomaly-list.md": "artifacts/release-verification/anomaly-list.md"
  }
}
