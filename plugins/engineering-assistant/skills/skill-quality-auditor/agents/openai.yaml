display_name: "Skill Quality Auditor"
short_description: "审计 skills 质量，防止空泛 prompt，阻断不合格 skill 入库。"
default_prompt: "使用 skill-quality-auditor，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "高风险 skill 入库"
    - "修改高风险质量门禁"
    - "skill gate 豁免"
metadata:
  owner: "skill owner"
  stage: "skill_quality"
  type: "audit_skill"
  trigger_description: "Use when the request is about 审计 skills 质量，防止空泛 prompt，阻断不合格 skill 入库。；Do not use when 不执行业务研发阶段；不替代 eval 执行。"
