{
  "node_id": "skill-quality-auditor",
  "stage": "skill_quality",
  "skill_id": "skill-quality-auditor",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "skills",
    "engineering-assistant/registry/skills.yaml",
    "skill-contract.schema.json"
  ],
  "outputs": [
    "skill-quality-report.md",
    "skill-quality-report.json",
    "skill-fix-suggestions.md",
    "skill-gate-decision.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "SKILL.md 存在",
    "description 清楚",
    "contract 完整",
    "schema 存在",
    "eval 覆盖",
    "workflow node 存在"
  ],
  "approval_policy": {
    "required_for": [
      "高风险 skill 入库",
      "修改高风险质量门禁",
      "skill gate 豁免"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "skill-quality-report.md": "artifacts/skill-quality-auditor/skill-quality-report.md",
    "skill-quality-report.json": "artifacts/skill-quality-auditor/skill-quality-report.json",
    "skill-fix-suggestions.md": "artifacts/skill-quality-auditor/skill-fix-suggestions.md",
    "skill-gate-decision.json": "artifacts/skill-quality-auditor/skill-gate-decision.json"
  }
}
