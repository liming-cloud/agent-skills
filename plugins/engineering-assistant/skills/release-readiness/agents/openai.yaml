display_name: "Release Readiness"
short_description: "判断是否具备发布条件，并输出发布计划、检查清单、回滚计划和 gate 决策。"
default_prompt: "使用 release-readiness，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "生产发布"
    - "生产配置变更"
    - "高风险发布"
    - "回滚操作"
metadata:
  owner: "发布负责人"
  stage: "release_readiness"
  type: "stage_skill"
  trigger_description: "Use when the request is about 判断是否具备发布条件，并输出发布计划、检查清单、回滚计划和 gate 决策。；Do not use when 不执行生产发布；不绕过高风险发布审批。"
routing:
  intent_tags:
    - "gate"
    - "readiness"
    - "release"
    - "release-readiness"
    - "release_readiness"
    - "stage_skill"
    - "决策。"
    - "判断是否具备发布条件"
    - "回滚计划和"
    - "并输出发布计划"
    - "检查清单"
  allow_implicit_invocation: false
  cost_class: "high"
