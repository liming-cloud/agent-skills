{
  "node_id": "release-readiness",
  "stage": "release_readiness",
  "skill_id": "release-readiness",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "code-quality-report.json",
    "code-review-report.md",
    "release-standard.md",
    "risk_policy"
  ],
  "outputs": [
    "release-plan.md",
    "release-checklist.md",
    "rollback-plan.md",
    "release-risk-report.json",
    "release-gate-decision.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "发布窗口明确",
    "回滚方案存在",
    "监控告警存在",
    "审批状态有效"
  ],
  "approval_policy": {
    "required_for": [
      "生产发布",
      "生产配置变更",
      "高风险发布",
      "回滚操作"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "release-plan.md": "artifacts/release-readiness/release-plan.md",
    "release-checklist.md": "artifacts/release-readiness/release-checklist.md",
    "rollback-plan.md": "artifacts/release-readiness/rollback-plan.md",
    "release-risk-report.json": "artifacts/release-readiness/release-risk-report.json",
    "release-gate-decision.json": "artifacts/release-readiness/release-gate-decision.json"
  }
}
