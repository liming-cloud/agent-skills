display_name: "Self Test"
short_description: "生成并执行自测方案，输出失败原因、影响范围和阻断判断。"
default_prompt: "使用 self-test，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "高风险测试豁免"
    - "无法执行关键测试"
    - "发布前置测试缺失"
metadata:
  owner: "测试负责人"
  stage: "self_test"
  type: "stage_skill"
  trigger_description: "Use when the request is about 生成并执行自测方案，输出失败原因、影响范围和阻断判断。；Do not use when 不伪造测试结果；不忽略失败测试。"
