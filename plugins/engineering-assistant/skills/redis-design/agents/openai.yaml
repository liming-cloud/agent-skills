display_name: "Redis Design"
short_description: "设计 Redis 使用方案，明确 key、value、TTL、一致性、降级和回滚策略。"
default_prompt: "使用 redis-design，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "Redis key 批量删除"
    - "核心链路缓存策略变化"
    - "无 TTL 高风险数据"
metadata:
  owner: "架构师"
  stage: "redis_design"
  type: "stage_skill"
  trigger_description: "Use when the request is about 设计 Redis 使用方案，明确 key、value、TTL、一致性、降级和回滚策略。；Do not use when 不替代数据库主数据设计；不未经审批批量删除 Redis key。"
