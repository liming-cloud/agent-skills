display_name: "Database Design"
short_description: "设计数据库表结构、索引、迁移、灰度和回滚方案，并标记生产变更审批点。"
default_prompt: "使用 database-design，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "DDL"
    - "数据订正"
    - "删除字段"
    - "删除索引"
    - "生产库变更"
    - "影响核心链路的索引调整"
metadata:
  owner: "DBA"
  stage: "database_design"
  type: "stage_skill"
  trigger_description: "Use when the request is about 设计数据库表结构、索引、迁移、灰度和回滚方案，并标记生产变更审批点。；Do not use when 不执行生产 DDL；不做无用途字段和索引。"
routing:
  intent_tags:
    - "database"
    - "database-design"
    - "database_design"
    - "design"
    - "stage_skill"
    - "并标记生产变更审批点。"
    - "灰度和回滚方案"
    - "索引"
    - "设计数据库表结构"
    - "迁移"
  allow_implicit_invocation: true
  cost_class: "medium"
