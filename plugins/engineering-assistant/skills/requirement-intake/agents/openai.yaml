display_name: "Requirement Intake"
short_description: "判断需求是否具备进入设计阶段的条件，并输出可复用需求契约。"
default_prompt: "使用 requirement-intake，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "高风险需求"
    - "跨系统重大依赖"
    - "数据/权限/发布风险"
metadata:
  owner: "产品/需求负责人"
  stage: "requirement_intake"
  type: "stage_skill"
  trigger_description: "Use when the request is about 判断需求是否具备进入设计阶段的条件，并输出可复用需求契约。；Do not use when 不替代产品决策；不生成代码。"
