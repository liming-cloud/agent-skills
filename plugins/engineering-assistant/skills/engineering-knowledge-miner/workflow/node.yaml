{
  "node_id": "engineering-knowledge-miner",
  "stage": "knowledge_mining",
  "skill_id": "engineering-knowledge-miner",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "design reports",
    "code quality reports",
    "review reports",
    "CI logs",
    "PR comments",
    "release reports",
    "incident reports"
  ],
  "outputs": [
    "engineering-lessons.md",
    "rule-candidates.yaml",
    "standard-patch-suggestions.md",
    "checklist-patch-suggestions.md",
    "skill-patch-suggestions.md",
    "regression-case-candidates.yaml",
    "knowledge-change-log.md"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "每条经验有来源证据",
    "规则默认 candidate",
    "owner 和适用范围明确",
    "反哺路径明确"
  ],
  "approval_policy": {
    "required_for": [
      "修改正式团队规范",
      "rule_candidate 标记为 approved",
      "修改高风险 skill quality gate"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "engineering-lessons.md": "artifacts/engineering-knowledge-miner/engineering-lessons.md",
    "rule-candidates.yaml": "artifacts/engineering-knowledge-miner/rule-candidates.yaml",
    "standard-patch-suggestions.md": "artifacts/engineering-knowledge-miner/standard-patch-suggestions.md",
    "checklist-patch-suggestions.md": "artifacts/engineering-knowledge-miner/checklist-patch-suggestions.md",
    "skill-patch-suggestions.md": "artifacts/engineering-knowledge-miner/skill-patch-suggestions.md",
    "regression-case-candidates.yaml": "artifacts/engineering-knowledge-miner/regression-case-candidates.yaml",
    "knowledge-change-log.md": "artifacts/engineering-knowledge-miner/knowledge-change-log.md"
  }
}
