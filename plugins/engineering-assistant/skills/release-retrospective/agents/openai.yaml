display_name: "Release Retrospective"
short_description: "复盘发布过程，沉淀发布问题、测试遗漏、设计遗漏、规范改进候选和 skill 改进候选。"
default_prompt: "使用 release-retrospective，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "行动项关闭"
    - "规范候选批准"
    - "高风险复盘结论发布"
metadata:
  owner: "发布负责人"
  stage: "release_retrospective"
  type: "stage_skill"
  trigger_description: "Use when the request is about 复盘发布过程，沉淀发布问题、测试遗漏、设计遗漏、规范改进候选和 skill 改进候选。；Do not use when 不将候选规范直接发布；不隐藏发布问题。"
routing:
  intent_tags:
    - "release"
    - "release-retrospective"
    - "release_retrospective"
    - "retrospective"
    - "skill"
    - "stage_skill"
    - "复盘发布过程"
    - "改进候选。"
    - "沉淀发布问题"
    - "测试遗漏"
    - "规范改进候选和"
    - "设计遗漏"
  allow_implicit_invocation: true
  cost_class: "medium"
