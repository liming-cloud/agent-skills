display_name: "Implementation Controller"
short_description: "把已审批设计转换为机器可读实现合同和质量合同，并控制代码实现、验证、修复和最终人工审阅。"
default_prompt: "使用 implementation-controller，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "修改已审批设计范围"
    - "高风险实现豁免"
    - "生产动作"
    - "修复轮次耗尽后的人工决策"
metadata:
  owner: "研发负责人"
  stage: "implementation_control"
  type: "control_skill"
  trigger_description: "Use when the request is about 把已审批设计转换为机器可读实现合同和质量合同，并控制代码实现、验证、修复和最终人工审阅。；Do not use when 不审批设计进入研发；不直接替代 code-development 编写业务代码。"
