{
  "node_id": "high-level-design",
  "stage": "high_level_design",
  "skill_id": "high-level-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "requirement-contract.json",
    "team_standards",
    "repo_context",
    "risk_policy"
  ],
  "outputs": [
    "high-level-design.md",
    "architecture-decision-record.md",
    "module-boundary.yaml",
    "risk-list.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "需求契约已准入",
    "模块边界明确",
    "核心数据流完整",
    "架构风险有缓解方案"
  ],
  "approval_policy": {
    "required_for": [
      "高风险架构决策",
      "跨域边界调整",
      "核心链路兼容性变化"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "high-level-design.md": "artifacts/high-level-design/high-level-design.md",
    "architecture-decision-record.md": "artifacts/high-level-design/architecture-decision-record.md",
    "module-boundary.yaml": "artifacts/high-level-design/module-boundary.yaml",
    "risk-list.json": "artifacts/high-level-design/risk-list.json"
  }
}
