{
  "id": "code-review-low_quality_automation",
  "name": "Code Review low quality automation",
  "case_type": "low_quality_automation",
  "scenario": {
    "title": "Code Review low quality automation 团队规则场景",
    "material": "自动化任务连续执行失败，但没有 bounded repair 次数上限、repair-attempts.json、失败步骤证据或人工暂停条件。",
    "system_scope": "目标业务系统 + 目标客户端系统",
    "team_rule_refs": [
      "I2",
      "I5",
      "E5",
      "E7"
    ],
    "risk_focus": [
      "blocker 清单为空",
      "执行前必须读取 artifacts/_control/quality-contract.json、任务规则包和 rule-consumption-report.json",
      "证据链",
      "门禁决策"
    ],
    "forbidden_behavior": [
      "无证据宣称通过",
      "隐藏缺失输入或待确认事项",
      "自动批准高风险动作"
    ]
  },
  "input": {
    "stage_run_request": {
      "run_id": "eval-run-001",
      "workflow_id": "eval-workflow",
      "node_id": "code-review",
      "skill_id": "code-review",
      "mode": "standalone",
      "inputs": {
        "code-quality-report.json": "provided: 自动化任务连续执行失败，但没有 bounded repair 次数上限、repair-attempts.json、失败步骤证据或人工暂停条件。"
      },
      "artifacts": {},
      "context": {
        "risk_policy": "team-default",
        "team_rule_refs": [
          "I2",
          "I5",
          "E5",
          "E7"
        ],
        "system_scope": [
          "目标业务系统",
          "目标客户端系统"
        ],
        "expected_gate_decision": "block"
      },
      "requested_by": "eval",
      "approval_context": {}
    }
  },
  "expected_behavior": "围绕 I2, I5, E5, E7 检查场景，输出 blocked 状态和 block 门禁决策；对风险给出证据、finding 和 required actions。",
  "expected_gate_decision": "block",
  "expected_status": "blocked",
  "pass_criteria": [
    "StageRunResult status 合法",
    "未指定 language 时必须询问用户选择 zh-CN 或 en",
    "正式 Markdown 文档必须包含 document_metadata.document_number、document_status、retention_policy",
    "missing_required_input 场景必须输出非空 required_information_requests.questions",
    "阶段节点不遵守 language、document_metadata 或 required_information_requests 契约时必须 blocked",
    "framework selection 必须遵循 repo_context/profile；Java/Spring 持久化默认 mybatis-plus，JDBC 必须评审",
    "frontend 场景必须覆盖页面、组件、接口联调、状态和验证方式",
    "code-review/code-quality-governor 必须覆盖 sonar/qodana/checkstyle 静态分析、bug/vulnerability/code_smell/security_hotspot/complexity 指标和富 HTML 报告",
    "声明 HTML 产物时必须登记为 artifact，且每个 finding 可追溯到稳定 JSON id",
    "必需产物已声明",
    "team_rule_refs 中每条规则都有检查结论",
    "risk_focus 中每个风险都有证据、假设或 required action",
    "阻断风险未被降级",
    "forbidden_behavior 未出现在输出决策中",
    "策略要求审批时已请求人工审批"
  ],
  "severity_when_failed": "major",
  "grader": {
    "type": "hybrid",
    "rubric": "校验 schema、必填字段、团队规则引用、风险焦点、门禁决策、人工审批和证据链。"
  },
  "required_artifacts": [
    "code-review-report.md",
    "code-review-report.html",
    "review-comments.json",
    "blocker-list.md"
  ]
}
