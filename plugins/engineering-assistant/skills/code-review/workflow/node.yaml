{
  "node_id": "code-review",
  "stage": "code_review",
  "skill_id": "code-review",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "code-quality-report.json",
    "changed-files-report.json",
    "implementation-summary.md",
    "repo_context"
  ],
  "outputs": [
    "code-review-report.md",
    "code-review-report.html",
    "review-comments.json",
    "blocker-list.md"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "blocker 清单为空",
    "所有问题有证据",
    "严重级别一致",
    "静态分析指标已纳入评审",
    "富 HTML 人工走查报告已生成",
    "修复建议可执行"
  ],
  "approval_policy": {
    "required_for": [
      "blocker 关闭",
      "高风险人工豁免",
      "核心链路评审通过"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "code-review-report.md": "artifacts/code-review/code-review-report.md",
    "code-review-report.html": "artifacts/code-review/code-review-report.html",
    "review-comments.json": "artifacts/code-review/review-comments.json",
    "blocker-list.md": "artifacts/code-review/blocker-list.md"
  }
}
