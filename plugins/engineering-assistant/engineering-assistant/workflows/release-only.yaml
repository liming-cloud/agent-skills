{
  "workflow_id": "release-only",
  "version": "1.0.0",
  "states": [
    "pending",
    "running",
    "waiting_for_input",
    "waiting_for_human_review",
    "succeeded",
    "failed",
    "skipped",
    "blocked",
    "cancelled"
  ],
  "gate_decisions": [
    "continue",
    "pause",
    "retry",
    "skip",
    "block",
    "stop"
  ],
  "supported_entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "default_entry_mode": "auto_flow",
  "start_node": "release-readiness",
  "terminal_nodes": [
    "release-retrospective"
  ],
  "composition_policy": {
    "auto_flow": "从 start_node 开始，按 next_nodes 自动流转；遇到阻断、等待输入或等待人工审批时暂停。",
    "from_node": "从用户指定 start_node 开始继续流转；必须校验该节点存在，并确认所需上游 artifacts 已提供或可从 artifact_index 获取。",
    "single_node": "只执行用户指定 target_node，不自动进入 next_nodes；输出该节点 StageRunResult 和可继续执行的后续节点建议。",
    "custom": "可按任务目标裁剪节点集合，但必须保留节点输入输出契约、失败策略、审批策略和产物路由。"
  },
  "nodes": [
    {
      "node_id": "release-readiness",
      "stage": "release_readiness",
      "skill_id": "release-readiness",
      "version": "1.0.0",
      "mode": "standalone|workflow",
      "entry_modes": [
        "auto_flow",
        "from_node",
        "single_node"
      ],
      "depends_on": [],
      "inputs": [
        "code-quality-report.json",
        "code-review-report.md",
        "release-standard.md",
        "risk_policy"
      ],
      "outputs": [
        "release-plan.md",
        "release-checklist.md",
        "rollback-plan.md",
        "release-risk-report.json",
        "release-gate-decision.json"
      ],
      "preconditions": [
        "contract 输入可用",
        "风险策略已加载"
      ],
      "postconditions": [
        "StageRunResult 已输出",
        "产物已登记索引"
      ],
      "quality_gates": [
        "发布窗口明确",
        "回滚方案存在",
        "监控告警存在",
        "审批状态有效"
      ],
      "approval_policy": {
        "required_for": [
          "生产发布",
          "生产配置变更",
          "高风险发布",
          "回滚操作"
        ],
        "decision": [
          "pending",
          "approved",
          "rejected"
        ]
      },
      "retry_policy": {
        "max_attempts": 1,
        "retry_on": [
          "TOOL_UNAVAILABLE",
          "UNKNOWN_ERROR"
        ]
      },
      "failure_policy": {
        "block_on": [
          "QUALITY_GATE_FAILED",
          "RISK_POLICY_VIOLATION",
          "STAGE_RESULT_CONTRACT_VIOLATION"
        ],
        "pause_on": [
          "HUMAN_APPROVAL_REQUIRED",
          "MISSING_REQUIRED_INPUT"
        ]
      },
      "next_nodes": [
        "release-verification"
      ],
      "artifact_mapping": {
        "release-plan.md": "artifacts/release-readiness/release-plan.md",
        "release-checklist.md": "artifacts/release-readiness/release-checklist.md",
        "rollback-plan.md": "artifacts/release-readiness/rollback-plan.md",
        "release-risk-report.json": "artifacts/release-readiness/release-risk-report.json",
        "release-gate-decision.json": "artifacts/release-readiness/release-gate-decision.json"
      }
    },
