  "workflow_id": "frontend-only",
  "version": "1.0.0",
  "states": [
    "pending",
    "running",
    "waiting_for_input",
    "waiting_for_human_review",
    "succeeded",
    "failed",
    "skipped",
    "blocked",
    "cancelled"
  ],
  "gate_decisions": [
    "continue",
    "pause",
    "retry",
    "skip",
    "block",
    "stop"
  ],
  "supported_entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
