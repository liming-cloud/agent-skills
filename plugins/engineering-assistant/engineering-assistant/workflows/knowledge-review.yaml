{
  "workflow_id": "knowledge-review",
  "version": "1.0.0",
  "states": [
    "pending",
    "running",
    "waiting_for_input",
    "waiting_for_human_review",
    "succeeded",
    "failed",
    "skipped",
    "blocked",
    "cancelled"
  ],
  "gate_decisions": [
    "continue",
    "pause",
    "retry",
    "skip",
    "block",
    "stop"
  ],
  "supported_entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "default_entry_mode": "auto_flow",
  "start_node": "engineering-knowledge-miner",
  "terminal_nodes": [
    "skill-quality-auditor"
  ],
  "composition_policy": {
    "auto_flow": "从 start_node 开始，按 next_nodes 自动流转；遇到阻断、等待输入或等待人工审批时暂停。",
    "from_node": "从用户指定 start_node 开始继续流转；必须校验该节点存在，并确认所需上游 artifacts 已提供或可从 artifact_index 获取。",
    "single_node": "只执行用户指定 target_node，不自动进入 next_nodes；输出该节点 StageRunResult 和可继续执行的后续节点建议。",
    "custom": "可按任务目标裁剪节点集合，但必须保留节点输入输出契约、失败策略、审批策略和产物路由。"
  },
  "nodes": [
    {
      "node_id": "engineering-knowledge-miner",
