{
  "rules": [
    {
      "id": "A1",
      "category": "架构",
      "rule": "不强制平台采用微服务 + 事件驱动 + DDD，但是设计文档必须体现系统边界、业务域、事件协作和最终一致性。"
    },
    {
      "id": "A2",
      "category": "架构",
      "rule": "系统间交互优先通过开放能力接口或事件，不允许直接调用未开放接口。"
    },
    {
      "id": "A3",
      "category": "架构",
      "rule": "目标业务系统与目标客户端系统属于不同系统边界，跨系统协作必须明确接口、事件、消息体、幂等和一致性。"
    },
    {
      "id": "A4",
      "category": "架构",
      "rule": "应用层只暴露 api/tapi/mapi/console，业务层和共享层只暴露 service 能力。"
    },
    {
      "id": "A5",
      "category": "架构",
      "rule": "关键跨系统场景必须进入关键场景设计；简单服务内部 CRUD 不进入关键场景文档。"
    },
    {
      "id": "A6",
      "category": "架构",
      "rule": "跨库事务优先本地消息表、事件驱动、补偿机制；必要时使用 Seata，并说明事务边界。"
    },
    {
      "id": "H1",
      "category": "概要设计",
      "rule": "概要设计必须包含平台概述、系统逻辑视图、系统设计原则、研发视图、核心功能、中间件设计、数据视图。"
    },
    {
      "id": "H2",
      "category": "概要设计",
      "rule": "明确参与系统、职责边界、调用方向、事件流和异常流。"
    },
    {
      "id": "H3",
      "category": "概要设计",
      "rule": "声明是否涉及 Redis/MQ/DB/定时任务/权限/幂等/跨系统交互。"
    },
    {
      "id": "H4",
      "category": "概要设计",
      "rule": "后端业务系统研发结构按 presentation/application/domain/port/infrastructure/common 分层；如项目 profile 另有约定，以 profile 为准。"
    },
    {
      "id": "H5",
      "category": "概要设计",
      "rule": "application 层负责编排，不直接沉淀复杂业务判断；核心业务规则进入 domain。"
    },
    {
      "id": "H6",
      "category": "概要设计",
      "rule": "聚合根不通过依赖注入创建，应通过工厂创建；一次业务中聚合根创建和修改边界要清晰。"
    },
    {
      "id": "D1",
      "category": "详细设计",
      "rule": "模块包含描述、业务流程、时序/交互、数据库设计、接口设计、单元测试设计。"
    },
    {
      "id": "D2",
      "category": "详细设计",
      "rule": "列出业务规则、状态机、校验规则、异常码、幂等点、事务边界、回滚策略。"
    },
    {
      "id": "D3",
      "category": "详细设计",
      "rule": "导入、批处理、异步任务必须写数据量上限、批次大小、超时时间、进度查询、失败处理。"
    },
    {
      "id": "D4",
      "category": "详细设计",
      "rule": "状态流转说明允许状态、终态、CAS/乐观锁控制、并发竞争处理。"
    },
    {
      "id": "D5",
      "category": "详细设计",
      "rule": "项目定制功能不能破坏原有通用能力，说明新增模块边界和兼容策略。"
    },
    {
      "id": "I2",
      "category": "接口",
      "rule": "接口必须有充分业务理由，禁止 API 简单封装 DB CRUD。"
    },
    {
      "id": "I5",
      "category": "接口",
      "rule": "响应结构为 header.code/header.message/body。"
    },
    {
      "id": "E5",
      "category": "异常",
      "rule": "禁止空 catch、只打印不抛、重复打印日志、用异常控制业务流程。"
    },
    {
      "id": "E7",
      "category": "异常",
      "rule": "异常日志必须包含 TraceId，敏感信息不得进入异常消息或日志。"
    },
    {
      "id": "P1",
      "category": "幂等并发",
      "rule": "修改核心数据接口必须评估幂等。"
    },
    {
      "id": "P4",
      "category": "幂等并发",
      "rule": "最终一致性只处理最新消息，旧消息基于时间戳/版本号丢弃。"
    },
    {
      "id": "R1",
      "category": "Redis",
      "rule": "Redis 只做加速层、协调层、短态承载层，不做事实库、分析库、跨服务共享源、消息队列。"
    },
    {
      "id": "R6",
      "category": "Redis",
      "rule": "所有 Key 必须设置 TTL，最大不超过 30 天，大批量 Key 增加随机抖动。"
    },
    {
      "id": "M3",
      "category": "MQ",
      "rule": "一个服务一个队列，一个队列可绑定多个 Exchange/routingKey。"
    },
    {
      "id": "M5",
      "category": "MQ",
      "rule": "必须配置死信队列，至少记录失败消息。"
    },
    {
      "id": "M6",
      "category": "MQ",
      "rule": "消息体默认不超过 10KB，超过需评审。"
    },
    {
      "id": "DB1",
      "category": "数据库",
      "rule": "MySQL 是事实数据唯一真相来源，Redis/MQ 不作为事实数据最终来源。"
    },
    {
      "id": "DB3",
      "category": "数据库",
      "rule": "禁止无条件全表查询，动态 where 至少有有效条件。"
    },
    {
      "id": "DB6",
      "category": "数据库",
      "rule": "数据迁移、DDL、订正需要迁移步骤、灰度、回滚、审批点。"
    },
    {
      "id": "FW1",
      "category": "框架选型",
      "rule": "框架选型必须在概要设计或详细设计中明确，未明确时必须主动询问用户或从项目 profile/repo_context 获取。"
    },
    {
      "id": "FW2",
      "category": "框架选型",
      "rule": "Java/Spring 后端默认持久化框架为 mybatis-plus；直接使用 JDBC 必须有明确项目约束或评审批准。"
    },
    {
      "id": "FW3",
      "category": "框架选型",
      "rule": "代码生成必须优先遵循现有仓库框架、依赖、分层和 mapper/repository 模式，不得凭空引入不同持久化技术。"
    },
    {
      "id": "FW4",
      "category": "框架选型",
      "rule": "选型变更、框架替换、直接 SQL/JDBC 绕过团队默认框架时必须进入设计评审和代码评审 blocker 检查。"
    },
    {
      "id": "FE1",
      "category": "前端",
      "rule": "涉及页面、组件、交互或客户端流程时必须进入前端设计，明确页面结构、组件边界、状态、接口和异常态。"
    },
    {
      "id": "FE2",
      "category": "前端",
      "rule": "前端研发必须遵循现有项目技术栈和组件库；未明确 React/Vue/移动端客户端等技术栈时必须主动询问用户。"
    },
    {
      "id": "FE3",
      "category": "前端",
      "rule": "前端设计必须覆盖接口联调契约、表单校验、加载/空态/错误态、权限可见性和埋点/可观测性。"
    },
    {
      "id": "FE4",
      "category": "前端",
      "rule": "前端实现必须输出设计到 UI 映射、变更文件、验证方式和兼容性风险。"
    },
    {
      "id": "DG1",
      "category": "文档治理",
      "rule": "正式留存文档必须具备唯一文档编号，格式为 <PREFIX>-<DOMAIN>-<YYYYMMDD>-<SEQ>。"
    },
    {
      "id": "DG2",
      "category": "文档治理",
      "rule": "文档必须声明 document_status 和 retention_policy；未声明时按中间过程产物处理。"
    },
    {
      "id": "DG3",
      "category": "文档治理",
      "rule": "draft、reviewing、blocked、waiting_for_input 状态文档不得作为正式文档沉淀。"
    },
    {
      "id": "DG4",
      "category": "文档治理",
      "rule": "只有 approved 或 final 且 retention_policy=persist 的文档可进入正式文档目录。"
    },
    {
      "id": "DG5",
      "category": "文档治理",
      "rule": "任务过程摘要、缺失输入清单、临时评审意见、workflow 运行状态只作为 run artifact 或 evidence，不得伪装为正式文档。"
    },
    {
      "id": "DG6",
      "category": "文档治理",
      "rule": "正式文档被替代时必须标记 superseded 或 archived，并记录替代关系。"
    },
    {
      "id": "QIN1",
      "category": "信息补全",
      "rule": "必填信息缺失且无法通过仓库或上游产物可靠推导时，skill 必须主动询问用户，不得继续伪造结论。"
    },
    {
      "id": "QIN2",
      "category": "信息补全",
      "rule": "主动询问必须区分 blocking 与 optional；blocking 问题未回答时状态必须为 waiting_for_input。"
    },
    {
      "id": "QIN3",
      "category": "信息补全",
      "rule": "每个问题必须说明用途、阻断原因、期望格式、示例和默认处理方式。"
    },
    {
      "id": "QIN4",
      "category": "信息补全",
      "rule": "一次询问优先返回最小必要问题集，按 critical、major、minor 排序，避免把可从上下文推导的信息重复问用户。"
    },
    {
      "id": "QIN5",
      "category": "信息补全",
      "rule": "用户补充信息后必须写回 StageRunRequest.context 或 artifact index，并保留来源。"
    },
    {
      "id": "QIN6",
      "category": "信息补全",
      "rule": "涉及高风险动作、审批、生产变更或跨系统边界的信息缺失时，不允许以假设绕过人工确认。"
    },
    {
      "id": "D6",
      "category": "详细设计",
      "rule": "涉及租户、认证、鉴权、角色、权限、多租户隔离时，必须生成 IAM/RBAC 专项规范。"
    },
    {
      "id": "D7",
      "category": "详细设计",
      "rule": "涉及 Spring AI、LLM provider、RAG、Agent、Tool Calling、Embedding、VectorStore 时，必须生成 Spring AI 专项规范。"
    },
    {
      "id": "D8",
      "category": "详细设计",
      "rule": "涉及快速演进的外部框架时，必须核对官方文档或官方发布页，并记录来源和核对日期。"
    },
    {
      "id": "CQ1",
      "category": "代码质量",
      "rule": "好代码必须同时满足正确性、领域表达、边界清晰、可测试、可维护、安全、可观测、性能并发可控和可演进。"
    },
    {
      "id": "CQ2",
      "category": "代码质量",
      "rule": "代码必须能映射到需求、设计文档、接口契约和测试证据；无法映射的实现视为无设计依据。"
    },
    {
      "id": "JDK1",
      "category": "JDK21",
      "rule": "JDK21 稳定特性可以提升表达力，但不得启用未批准 preview feature 或让新语法掩盖复杂业务。"
    },
    {
      "id": "DDD1",
      "category": "DDD",
      "rule": "domain 层禁止依赖 Spring、MyBatis-Plus、Redis、MQ、Sa-Token、Spring AI 等框架。"
    },
    {
      "id": "DDD2",
      "category": "DDD",
      "rule": "application 层负责编排和事务边界，不沉淀复杂业务规则，不直接依赖 mapper/SDK。"
    },
    {
      "id": "TDD1",
      "category": "TDD",
      "rule": "代码研发必须有测试清单、失败测试、最小实现、重构和异常路径补充证据。"
    },
    {
      "id": "FWU1",
      "category": "框架高级特性",
      "rule": "框架高级特性必须降低复杂度或增强可靠性，不得泄漏到业务层。"
    },
    {
      "id": "DP1",
      "category": "设计模式",
      "rule": "设计模式必须对应真实变化点，禁止为模式而模式和过早抽象。"
    },
    {
      "id": "DG17",
      "category": "文档治理",
      "rule": "项目规范必须生成 artifacts/rule-governance/rule-registry.json，作为 task agent 和 reviewer 的机读规则索引。"
    },
    {
      "id": "DG18",
      "category": "文档治理",
      "rule": "每个 workflow 任务必须优先读取 artifacts/rule-governance/task-rule-packs/<task>.json；规则包缺失或校验失败时不得进入实现或审核通过。"
    },
    {
      "id": "DG19",
      "category": "文档治理",
      "rule": "规则治理产物必须排除 human-readable 和 human-review HTML，只从 agent 事实源生成。"
    },
    {
      "id": "DG20",
      "category": "文档治理",
      "rule": "规则包必须保留 rule_id、强度、标签、规则文本、来源路径和行号。"
    },
    {
      "id": "DG21",
      "category": "文档治理",
      "rule": "重复规范必须先生成 duplicate report，再由文档治理任务合并、归档或标记替代关系。"
    },
    {
      "id": "DG22",
      "category": "文档治理",
      "rule": "审核 finding 必须引用适用 rule_id；没有读取任务规则包的审核结论无效。"
    }
  ],
