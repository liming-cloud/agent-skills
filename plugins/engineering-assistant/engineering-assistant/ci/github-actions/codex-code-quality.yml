{
  "name": "Codex 代码质量门禁",
  "on": {
    "pull_request": {
      "types": [
        "opened",
        "synchronize",
        "review_requested"
      ]
    }
  },
  "permissions": {
    "contents": "read",
    "pull-requests": "write",
    "checks": "write"
  },
  "jobs": {
    "quality": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "name": "收集 CI 产物",
          "run": "python3 engineering-assistant/scripts/collect_ci_artifacts.py"
        },
        {
          "name": "校验 skill contract",
          "run": "python3 engineering-assistant/scripts/validate_skill_contract.py skills/*/contract.yaml"
        },
        {
          "name": "校验 skill metadata",
          "run": "python3 engineering-assistant/scripts/validate_skill_metadata.py"
        },
        {
          "name": "校验 skill eval 覆盖",
          "run": "python3 engineering-assistant/scripts/run_skill_evals.py"
        },
        {
          "name": "校验文档生命周期 schema",
          "run": "python3 -m json.tool engineering-assistant/schemas/document-lifecycle.schema.json"
        },
        {
          "name": "校验主动询问信息 schema",
          "run": "python3 -m json.tool engineering-assistant/schemas/required-information-request.schema.json"
        }
      ]
    }
  }
}
