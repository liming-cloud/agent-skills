{
  "node_id": "mq-design",
  "stage": "mq_design",
  "skill_id": "mq-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "detailed-design.md",
    "mq-standard.md",
    "repo_context",
    "risk_policy"
  ],
  "outputs": [
    "mq-design.md",
    "mq-topic-contract.yaml",
    "message-schema.json",
    "mq-risk-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "mq-design.md 使用团队 MQ 模板",
    "生产者表完整",
    "消费者表完整",
    "消息 schema 完整",
    "幂等策略明确",
    "重试/死信/回放策略明确",
    "监控告警明确"
  ],
  "approval_policy": {
    "required_for": [
      "MQ topic 删除或重命名",
      "MQ 新队列或 topic",
      "核心消息链路变化",
      "生产消息回放",
      "消息体超过 10KB",
      "非仲裁队列"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "mq-design.md": "artifacts/mq-design/mq-design.md",
    "mq-topic-contract.yaml": "artifacts/mq-design/mq-topic-contract.yaml",
    "message-schema.json": "artifacts/mq-design/message-schema.json",
    "mq-risk-report.json": "artifacts/mq-design/mq-risk-report.json"
  }
}
