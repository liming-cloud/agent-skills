{
  "skill_id": "mq-design",
  "skill_name": "MQ Design",
  "version": "1.0.0",
  "stage": "mq_design",
  "type": "stage_skill",
  "purpose": "设计 MQ 主题、消息体、生产消费链路、幂等、重试、死信和回放策略。",
  "non_goals": [
    "不未经审批删除或重命名 topic",
    "不隐藏重复消费风险",
    "不把不同语义消息混成单一处理流"
  ],
  "trigger_description": "Use when the request is about 设计 MQ 主题、消息体、生产消费链路、幂等、重试、死信和回放策略。；Do not use when 不未经审批删除或重命名 topic；不隐藏重复消费风险。",
  "routing": {
    "intent_tags": [
      "MQ",
      "design",
      "mq",
      "mq-design",
      "mq_design",
      "stage_skill",
      "主题",
      "幂等",
      "死信和回放策略。",
      "消息体",
      "生产消费链路",
      "设计"
    ],
    "positive_triggers": [
      "mq-design",
      "MQ Design",
      "设计 MQ 主题、消息体、生产消费链路、幂等、重试、死信和回放策略。"
    ],
    "negative_triggers": [
      "只解释 MQ Design 的用途，不执行任务",
      "只咨询说明",
      "不生成产物"
    ],
    "requires": [
      "detailed-design.md",
      "mq-standard.md",
      "repo_context",
      "risk_policy"
    ],
    "conflicts_with": [],
    "risk_level": "medium",
    "cost_class": "medium",
    "evidence_required": [
      "mq-design.md 使用团队 MQ 模板",
      "生产者表完整",
      "消费者表完整",
      "消息 schema 完整",
      "幂等策略明确",
      "重试/死信/回放策略明确",
      "监控告警明确"
    ],
    "allow_implicit_invocation": true
  },
  "standalone_mode": "读取输入、校验前置条件、在指定输出目录生成全部声明产物，并在阻断门禁处停止。",
  "workflow_mode": "消费 StageRunRequest 中的上游产物，输出 StageRunResult，并把声明产物路由给下游 workflow 节点。",
  "language_policy": {
    "supported": [
      "zh-CN",
      "en"
    ],
    "when_unspecified": "ask_user",
    "blocking_status": "waiting_for_input",
    "question": "请确认输出语言：简体中文还是 English？",
    "writeback": "StageRunRequest.context.language"
  },
  "technology_selection_policy": {
    "categories": [
      "backend_framework",
      "persistence_framework",
      "frontend_stack",
      "component_library",
      "middleware",
      "test_framework",
      "build_tool",
      "observability",
      "deployment"
    ],
    "must_confirm_when": [
      "设计未声明技术选型",
      "repo_context 未识别现有技术栈",
      "生成代码需要选择后端/持久化/前端/组件库/测试/构建框架",
      "拟使用与现有项目不一致的技术"
    ],
    "ask_user_when_unspecified": true,
    "team_defaults": {
      "java_spring_persistence": "mybatis-plus"
    },
    "requires_review": [
      "JDBC",
      "框架替换",
      "绕过现有 mapper/repository 模式",
      "前端技术栈或组件库变更",
      "测试框架替换",
      "构建工具替换",
      "中间件替换"
    ],
    "writeback": "StageRunRequest.context.technology_selection"
  },
  "team_adaptation_policy": {
    "profile_id": "rrq-yq-team",
    "profile_path": "engineering-assistant/profiles/rrq-yq-team.yaml",
    "source_catalog": "engineering-assistant/registry/team-standard-sources.yaml",
    "rule_prefixes": [
      "RRQ",
      "YAPI",
      "YQ"
    ],
    "must_load_before_work": [
      "team-rule-catalog.yaml",
      "team-standard-sources.yaml",
      "rrq-yq-team.yaml"
    ],
    "fallback": "如果目标项目 profile 与团队默认 profile 冲突，优先使用目标项目 profile，并把冲突作为 finding 或 required_information_requests 输出。"
  },
  "inputs": [
    {
      "name": "detailed-design.md",
      "type": "artifact|string|object",
      "required": true,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "mq-standard.md",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "repo_context",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "risk_policy",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    }
  ],
  "outputs": [
    {
      "name": "mq-design.md",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/mq-design/mq-design.md",
      "schema": "output.schema.json#mq-design.md",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "mq-topic-contract.yaml",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/mq-design/mq-topic-contract.yaml",
      "schema": "output.schema.json#mq-topic-contract.yaml",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "message-schema.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/mq-design/message-schema.json",
      "schema": "output.schema.json#message-schema.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "mq-risk-report.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/mq-design/mq-risk-report.json",
      "schema": "output.schema.json#mq-risk-report.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    }
  ],
  "preconditions": [
    "必填输入已提供或已记录缺失处理策略",
    "风险策略已加载",
    "目标范围已明确"
  ],
  "execution_gates": {
    "language_confirmed": true,
    "preflight_required_information": true,
    "formal_document_metadata_required": true,
    "stage_result_validation_required": true,
    "block_when_agent_violates_contract": true
  },
  "required_information_policy": {
    "must_ask_when": [
      "必填输入缺失",
      "系统边界无法确认",
      "风险等级无法判断",
      "审批状态缺失",
      "无法基于仓库或上游产物可靠推导"
    ],
    "question_output": "required_information_requests",
    "blocking_status": "waiting_for_input",
    "human_review_html_required": true,
    "human_review_html_requirements": [
      "可填写每个待确认项",
      "保留问题 id 或稳定序号",
      "可复制或下载答案 JSON",
      "登记到 StageRunResult.artifacts",
      "HTML 路径必须位于目标项目 docs/human-review/",
      "agent 只消费 MD/JSON/YAML，不把 HTML 作为事实输入源"
    ],
    "minimum_question_fields": [
      "id",
      "question",
      "reason",
      "required",
      "priority",
      "expected_format"
    ],
    "question_order": [
      "critical",
      "major",
      "minor"
    ],
    "do_not_ask_when": "信息可从当前仓库、上游产物、明确 profile 或已确认上下文可靠获得时，不重复询问用户。"
  },
  "postconditions": [
    "全部输出产物已生成，或已输出明确的阻断结果",
    "质量门禁已评估",
    "需要人工审批的事项已列出"
  ],
  "dependencies": [
    "团队规范",
    "文档模板",
    "仓库上下文",
    "风险策略",
    "校验脚本"
  ],
  "permissions": {
    "allowed_actions": [
      "读取仓库文件",
      "生成产物",
      "运行确定性校验",
      "请求人工审批"
    ],
    "forbidden_actions": [
      "执行生产变更",
      "自动批准高风险动作",
      "隐藏失败检查",
      "覆盖无关工作"
    ]
  },
  "human_approval_required": [
    "MQ topic 删除或重命名",
    "MQ 新队列或 topic",
    "核心消息链路变化",
    "生产消息回放",
    "消息体超过 10KB",
    "非仲裁队列"
  ],
  "risk_model": {
    "levels": [
      "low",
      "medium",
      "high",
      "critical"
    ],
    "upgrade_conditions": [
      "MQ topic 删除或重命名",
      "MQ 新队列或 topic",
      "核心消息链路变化",
      "生产消息回放",
      "消息体超过 10KB",
      "非仲裁队列"
    ],
    "default_for_unknown": "medium"
  },
  "quality_gates": [
    {
      "gate_id": "mq-design-gate-1",
      "name": "mq-design.md 使用团队 MQ 模板",
      "type": "deterministic",
      "pass_condition": "mq-design.md 使用团队 MQ 模板 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-2",
      "name": "生产者表完整",
      "type": "deterministic",
      "pass_condition": "生产者表完整 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-3",
      "name": "消费者表完整",
      "type": "deterministic",
      "pass_condition": "消费者表完整 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-4",
      "name": "消息 schema 完整",
      "type": "deterministic",
      "pass_condition": "消息 schema 完整 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-5",
      "name": "幂等策略明确",
      "type": "deterministic",
      "pass_condition": "幂等策略明确 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-6",
      "name": "重试/死信/回放策略明确",
      "type": "deterministic",
      "pass_condition": "重试/死信/回放策略明确 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "mq-design-gate-7",
      "name": "监控告警明确",
      "type": "deterministic",
      "pass_condition": "监控告警明确 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    }
  ],
  "failure_modes": [
    {
      "error_code": "MISSING_REQUIRED_INPUT",
      "condition": "必填输入不可用",
      "severity": "major",
      "recovery_strategy": "输出缺失信息产物并等待补充输入",
      "next_state": "waiting_for_input"
    },
    {
      "error_code": "INVALID_OUTPUT_SCHEMA",
      "condition": "输出无法按声明 schema 解析",
      "severity": "blocker",
      "recovery_strategy": "重新生成产物并再次运行校验器",
      "next_state": "failed"
    },
    {
      "error_code": "STAGE_RESULT_CONTRACT_VIOLATION",
      "condition": "StageRunResult 缺少语言、文档编号、主动问询或其他运行时门禁字段",
      "severity": "blocker",
      "recovery_strategy": "运行 validate_stage_run_result.py 并阻断违规节点",
      "next_state": "blocked"
    },
    {
      "error_code": "QUALITY_GATE_FAILED",
      "condition": "阻断门禁失败",
      "severity": "blocker",
      "recovery_strategy": "输出 findings 和 required actions",
      "next_state": "blocked"
    },
    {
      "error_code": "HUMAN_APPROVAL_REQUIRED",
      "condition": "风险策略要求人工审批",
      "severity": "major",
      "recovery_strategy": "创建 ApprovalRequest",
      "next_state": "waiting_for_human_review"
    }
  ],
  "eval_cases": [
    "happy_path",
    "missing_required_input",
    "ambiguous_input",
    "policy_conflict",
    "edge_case",
    "regression_case",
    "technology_demo_adoption",
    "control_plane_drift",
    "rule_consumption_gap",
    "context_noise_overload",
    "low_quality_automation"
  ],
  "workflow_interface": {
    "node_id": "mq-design",
    "input_artifacts": [
      "detailed-design.md",
      "mq-standard.md",
      "repo_context",
      "risk_policy"
    ],
    "output_artifacts": [
      "mq-design.md",
      "mq-topic-contract.yaml",
      "message-schema.json",
      "mq-risk-report.json"
    ],
    "document_metadata": {
      "schema": "engineering-assistant/schemas/document-lifecycle.schema.json",
      "required_when": "status=succeeded and markdown artifact exists"
    },
    "required_information_requests": {
      "artifact": "artifacts/mq-design/required-information-request.json",
      "schema": "engineering-assistant/schemas/required-information-request.schema.json",
      "status_when_blocking": "waiting_for_input"
    },
    "state_transitions": [
      "pending",
      "running",
      "waiting_for_input",
      "waiting_for_human_review",
      "succeeded",
      "failed",
      "skipped",
      "blocked",
      "cancelled"
    ],
    "gate_decision": [
      "continue",
      "pause",
      "retry",
      "skip",
      "block",
      "stop"
    ],
    "retry_policy": {
      "max_attempts": 1,
      "retry_on": [
        "TOOL_UNAVAILABLE",
        "UNKNOWN_ERROR"
      ]
    }
  },
  "owner": "架构师",
  "reviewers": [
    "研发负责人",
    "架构师",
    "测试负责人"
  ],
  "change_policy": "contract、gate、schema 或审批规则变更必须经过 skill owner 评审，并通过 skill-quality-auditor",
  "team_document_policy": {
    "artifact": "mq-design.md",
    "producer_table_fields": [
      "业务用途",
      "场景应用",
      "业务消息 key",
      "消息类型",
      "消息体内容",
      "优先等级",
      "消息 TTL",
      "持久化",
      "目的交换机",
      "路由 key",
      "消息预估大小",
      "生产服务或模块名称",
      "软件需求号或 bug 号",
      "设计日期",
      "设计者",
      "备注"
    ],
    "consumer_table_fields": [
      "队列名称",
      "业务用途",
      "场景应用",
      "单消费节点消费",
      "队列类型",
      "优先队列",
      "是否持久化",
      "自动删除",
      "TTL",
      "消息大小",
      "绑定的 Exchange/routingKey",
      "死信队列 exchange/routeKey",
      "消费服务",
      "消息 key",
      "运维监控",
      "软件需求号或 bug 号",
      "设计日期",
      "设计者",
      "备注"
    ],
    "rules": [
      "MQ 只用于削峰填谷、异步执行和服务解耦",
      "进程内异步不默认使用 MQ",
      "一个服务一个队列，一个队列可绑定多个 Exchange/routingKey",
      "队列默认建议仲裁队列",
      "必须设计死信队列",
      "消息体默认不超过 10KB",
      "必须定义幂等、重试、死信、回放策略"
    ],
    "waiting_for_human_review_when": [
      "MQ 新队列",
      "MQ 新 topic",
      "非仲裁队列",
      "消息体超过 10KB",
      "生产消息回放",
      "删除或重命名 topic/queue"
    ],
    "blocked_when": [
      "缺少生产者表或消费者表",
      "消息体承载大查询条件、文件内容或敏感明文",
      "无幂等策略",
      "无死信队列"
    ]
  }
}
