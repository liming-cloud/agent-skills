{
  "node_id": "self-test",
  "stage": "self_test",
  "skill_id": "self-test",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "implementation-summary.md",
    "changed-files-report.json",
    "test-strategy.md",
    "repo_context"
  ],
  "outputs": [
    "self-test-report.md",
    "test-commands.log",
    "coverage-summary.md",
    "failed-tests.md",
    "test-risk-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "测试命令实际执行",
    "失败测试明确阻断",
    "覆盖主干/边界/异常/幂等",
    "覆盖率变化有解释"
  ],
  "approval_policy": {
    "required_for": [
      "高风险测试豁免",
      "无法执行关键测试",
      "发布前置测试缺失"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "self-test-report.md": "artifacts/self-test/self-test-report.md",
    "test-commands.log": "artifacts/self-test/test-commands.log",
    "coverage-summary.md": "artifacts/self-test/coverage-summary.md",
    "failed-tests.md": "artifacts/self-test/failed-tests.md",
    "test-risk-report.json": "artifacts/self-test/test-risk-report.json"
  }
}
