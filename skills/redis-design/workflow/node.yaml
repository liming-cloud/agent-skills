{
  "node_id": "redis-design",
  "stage": "redis_design",
  "skill_id": "redis-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "detailed-design.md",
    "redis-standard.md",
    "repo_context",
    "risk_policy"
  ],
  "outputs": [
    "redis-design.md",
    "redis-key-registry.yaml",
    "cache-consistency-plan.md",
    "redis-risk-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "redis-design.md 使用团队 Redis 模板",
    "key 命名合规",
    "所有 Key 设置 TTL 且单位明确",
    "一致性策略可验证",
    "穿透/击穿/雪崩有策略",
    "不可用降级策略明确"
  ],
  "approval_policy": {
    "required_for": [
      "Redis key 批量删除",
      "核心链路缓存策略变化",
      "Redis 新 Key",
      "版本/拓扑/持久化/淘汰策略无法确认"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "redis-design.md": "artifacts/redis-design/redis-design.md",
    "redis-key-registry.yaml": "artifacts/redis-design/redis-key-registry.yaml",
    "cache-consistency-plan.md": "artifacts/redis-design/cache-consistency-plan.md",
    "redis-risk-report.json": "artifacts/redis-design/redis-risk-report.json"
  }
}
