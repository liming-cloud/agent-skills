display_name: "Design Review"
short_description: "评审设计产物，判断是否可以进入代码研发。"
default_prompt: "使用 design-review，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "高风险设计放行"
    - "blocker 关闭确认"
    - "关键设计豁免"
metadata:
  owner: "架构师"
  stage: "design_review"
  type: "stage_skill"
  trigger_description: "Use when the request is about 评审设计产物，判断是否可以进入代码研发。；Do not use when 不代替审批人签字；不修正文档内容。"
routing:
  intent_tags:
    - "design"
    - "design-review"
    - "design_review"
    - "review"
    - "stage_skill"
    - "判断是否可以进入代码研发。"
    - "评审设计产物"
  allow_implicit_invocation: true
  cost_class: "medium"
