{
  "node_id": "release-retrospective",
  "stage": "release_retrospective",
  "skill_id": "release-retrospective",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "release-verification-report.md",
    "code-quality-report.json",
    "incident reports",
    "release logs"
  ],
  "outputs": [
    "release-retrospective.md",
    "release-lessons.yaml",
    "follow-up-actions.md"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "问题有证据",
    "行动项有 owner",
    "规范候选状态为 candidate",
    "skill 改进候选明确"
  ],
  "approval_policy": {
    "required_for": [
      "行动项关闭",
      "规范候选批准",
      "高风险复盘结论发布"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "release-retrospective.md": "artifacts/release-retrospective/release-retrospective.md",
    "release-lessons.yaml": "artifacts/release-retrospective/release-lessons.yaml",
    "follow-up-actions.md": "artifacts/release-retrospective/follow-up-actions.md"
  }
}
