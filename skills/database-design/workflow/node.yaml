{
  "node_id": "database-design",
  "stage": "database_design",
  "skill_id": "database-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "detailed-design.md",
    "database-standard.md",
    "repo_context",
    "risk_policy"
  ],
  "outputs": [
    "database-design.md",
    "schema-change-plan.sql",
    "migration-plan.md",
    "rollback-plan.md",
    "database-risk-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "database-design.md 使用 OLTP 或 OLAP 团队模板",
    "字段和索引均有查询/约束用途",
    "迁移步骤可回滚",
    "容量和查询模式已评估",
    "生产变更审批明确",
    "未确认库名/实例/字符集/索引名时不得 final"
  ],
  "approval_policy": {
    "required_for": [
      "DDL",
      "数据订正",
      "删除字段",
      "删除索引",
      "生产库变更",
      "影响核心链路的索引调整",
      "物理删除在线事实行"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "database-design.md": "artifacts/database-design/database-design.md",
    "schema-change-plan.sql": "artifacts/database-design/schema-change-plan.sql",
    "migration-plan.md": "artifacts/database-design/migration-plan.md",
    "rollback-plan.md": "artifacts/database-design/rollback-plan.md",
    "database-risk-report.json": "artifacts/database-design/database-risk-report.json"
  }
}
