{
  "node_id": "frontend-development",
  "stage": "frontend_development",
  "skill_id": "frontend-development",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "frontend-design.md",
    "component-contracts.yaml",
    "interface-contracts.yaml",
    "repo_context"
  ],
  "outputs": [
    "code changes",
    "frontend-implementation-summary.md",
    "design-to-ui-mapping.yaml",
    "frontend-changed-files-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "每个 UI 变更映射到前端设计",
    "组件和状态边界符合现有项目",
    "接口联调风险已标记",
    "前端验证方式已列出"
  ],
  "approval_policy": {
    "required_for": [
      "公共组件改造",
      "前端技术栈或组件库变更",
      "影响核心客户端流程"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "code changes": "artifacts/frontend-development/code changes",
    "frontend-implementation-summary.md": "artifacts/frontend-development/frontend-implementation-summary.md",
    "design-to-ui-mapping.yaml": "artifacts/frontend-development/design-to-ui-mapping.yaml",
    "frontend-changed-files-report.json": "artifacts/frontend-development/frontend-changed-files-report.json"
  }
}
