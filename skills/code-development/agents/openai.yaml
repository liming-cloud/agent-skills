display_name: "Code Development"
short_description: "基于设计文档进行最小必要代码变更或生成代码修改计划。"
default_prompt: "使用 code-development，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "DB/Redis/MQ/权限/发布脚本变更"
    - "核心链路实现偏离设计"
    - "高风险重构"
metadata:
  owner: "后端开发"
  stage: "code_development"
  type: "stage_skill"
  trigger_description: "Use when the request is about 基于设计文档进行最小必要代码变更或生成代码修改计划。；Do not use when 不修改无关模块；不绕过测试。"
