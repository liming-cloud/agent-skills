{
  "node_id": "code-development",
  "stage": "code_development",
  "skill_id": "code-development",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "detailed-design.md",
    "implementation-plan.md",
    "interface-contracts.yaml",
    "repo_context"
  ],
  "outputs": [
    "code changes",
    "implementation-summary.md",
    "design-to-code-mapping.yaml",
    "changed-files-report.json",
    "traceability-matrix.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "每个变更映射到设计",
    "无无关模块修改",
    "高风险文件已标记",
    "测试命令已列出",
    "需求-设计-代码追踪矩阵已刷新"
  ],
  "approval_policy": {
    "required_for": [
      "DB/Redis/MQ/权限/发布脚本变更",
      "核心链路实现偏离设计",
      "高风险重构"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "code changes": "artifacts/code-development/code changes",
    "implementation-summary.md": "artifacts/code-development/implementation-summary.md",
    "design-to-code-mapping.yaml": "artifacts/code-development/design-to-code-mapping.yaml",
    "changed-files-report.json": "artifacts/code-development/changed-files-report.json",
    "traceability-matrix.json": "artifacts/code-development/traceability-matrix.json"
  }
}
