display_name: "Repo Context Miner"
short_description: "从现有仓库中提取设计和研发所需的代码上下文，形成模块地图、接口/数据/中间件使用清单和影响范围。"
default_prompt: "使用 repo-context-miner，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "读取敏感配置"
    - "跨仓库分析"
    - "高风险影响范围确认"
metadata:
  owner: "架构师/资深开发"
  stage: "repo_context"
  type: "stage_skill"
  trigger_description: "Use when the request is about 从现有仓库中提取设计和研发所需的代码上下文，形成模块地图、接口/数据/中间件使用清单和影响范围。；Do not use when 不直接修改代码；不替代业务设计。"
