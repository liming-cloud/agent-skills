{
  "node_id": "repo-context-miner",
  "stage": "repo_context",
  "skill_id": "repo-context-miner",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "repository_path",
    "requirement-contract.json",
    "team_standards",
    "risk_policy"
  ],
  "outputs": [
    "repo-context-report.md",
    "module-map.yaml",
    "impact-scope.yaml",
    "reusable-capabilities.md",
    "repo-risk-list.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "仓库路径可访问",
    "模块边界有证据",
    "影响范围明确",
    "可复用能力已登记"
  ],
  "approval_policy": {
    "required_for": [
      "读取敏感配置",
      "跨仓库分析",
      "高风险影响范围确认"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "repo-context-report.md": "artifacts/repo-context-miner/repo-context-report.md",
    "module-map.yaml": "artifacts/repo-context-miner/module-map.yaml",
    "impact-scope.yaml": "artifacts/repo-context-miner/impact-scope.yaml",
    "reusable-capabilities.md": "artifacts/repo-context-miner/reusable-capabilities.md",
    "repo-risk-list.json": "artifacts/repo-context-miner/repo-risk-list.json"
  }
}
