      "I3",
      "I4",
      "E7"
    ],
    "risk_focus": [
      "接口职责失控",
      "安全风险",
      "字段命名和响应契约"
    ],
    "forbidden_behavior": [
      "认为通用 CRUD 接口提高效率",
      "忽略权限和审计风险"
    ]
  },
  "input": {
    "stage_run_request": {
      "run_id": "eval-run-001",
      "workflow_id": "eval-workflow",
      "node_id": "detailed-design",
      "skill_id": "detailed-design",
      "mode": "standalone",
      "inputs": {
        "high-level-design.md": "provided: 设计新增 /api/v1/franchise/updateDbField，入参 tableName、fieldName、value，用于任意更新配置表。"
