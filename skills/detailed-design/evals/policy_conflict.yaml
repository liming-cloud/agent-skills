      "artifacts": {},
      "context": {
        "risk_policy": "team-default",
        "team_rule_refs": [
          "I1",
          "I2",
          "I3",
          "I4",
          "E7"
        ],
        "system_scope": [
          "目标业务系统",
          "目标客户端系统"
        ],
        "expected_gate_decision": "block"
      },
      "requested_by": "eval",
      "approval_context": {}
    }
