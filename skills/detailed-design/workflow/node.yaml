{
  "node_id": "detailed-design",
  "stage": "detailed_design",
  "skill_id": "detailed-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "high-level-design.md",
    "architecture-decision-record.md",
    "module-boundary.yaml",
    "team_standards"
  ],
  "outputs": [
    "detailed-design.md",
    "implementation-plan.md",
    "interface-contracts.yaml",
    "test-strategy.md"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "接口定义完整",
    "事务边界明确",
    "幂等策略明确",
    "测试策略覆盖主干和异常路径"
  ],
  "approval_policy": {
    "required_for": [
      "核心链路事务边界变化",
      "高并发路径设计",
      "权限/认证/鉴权设计"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "detailed-design.md": "artifacts/detailed-design/detailed-design.md",
    "implementation-plan.md": "artifacts/detailed-design/implementation-plan.md",
    "interface-contracts.yaml": "artifacts/detailed-design/interface-contracts.yaml",
    "test-strategy.md": "artifacts/detailed-design/test-strategy.md"
  }
}
