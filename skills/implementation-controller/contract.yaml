{
  "skill_id": "implementation-controller",
  "skill_name": "Implementation Controller",
  "version": "1.0.0",
  "stage": "implementation_control",
  "type": "control_skill",
  "purpose": "把已审批设计转换为机器可读实现合同和质量合同，并控制代码实现、验证、修复和最终人工审阅。",
  "non_goals": [
    "不审批设计进入研发",
    "不直接替代 code-development 编写业务代码",
    "不把 HTML 人工审阅件作为 agent 事实源"
  ],
  "trigger_description": "Use when the request is about 把已审批设计转换为机器可读实现合同和质量合同，并控制代码实现、验证、修复和最终人工审阅。；Do not use when 不审批设计进入研发；不直接替代 code-development 编写业务代码。",
  "standalone_mode": "读取输入、校验前置条件、在指定输出目录生成全部声明产物，并在阻断门禁处停止。",
  "workflow_mode": "消费 StageRunRequest 中的上游产物，输出 StageRunResult，并把声明产物路由给下游 workflow 节点。",
  "language_policy": {
    "supported": [
      "zh-CN",
      "en"
    ],
    "when_unspecified": "ask_user",
    "blocking_status": "waiting_for_input",
    "question": "请确认输出语言：简体中文还是 English？",
    "writeback": "StageRunRequest.context.language"
  },
  "technology_selection_policy": {
    "categories": [
      "backend_framework",
      "persistence_framework",
      "frontend_stack",
      "component_library",
      "middleware",
      "test_framework",
      "build_tool",
      "observability",
      "deployment"
    ],
    "must_confirm_when": [
      "设计未声明技术选型",
      "repo_context 未识别现有技术栈",
      "生成代码需要选择后端/持久化/前端/组件库/测试/构建框架",
      "拟使用与现有项目不一致的技术"
    ],
    "ask_user_when_unspecified": true,
    "team_defaults": {
      "java_spring_persistence": "mybatis-plus"
    },
    "requires_review": [
      "JDBC",
      "框架替换",
      "绕过现有 mapper/repository 模式",
      "前端技术栈或组件库变更",
      "测试框架替换",
      "构建工具替换",
      "中间件替换"
    ],
    "writeback": "StageRunRequest.context.technology_selection"
  },
  "inputs": [
    {
      "name": "approved design artifact",
      "type": "artifact|string|object",
      "required": true,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "target project root",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "project profile",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    },
    {
      "name": "changed-files-report.json",
      "type": "artifact|string|object",
      "required": false,
      "source": "user|workflow|repo|ci",
      "validation": "必填输入必须存在，选填输入必须可追溯来源",
      "missing_strategy": "除非无法定义边界，否则基于明确假设继续；无法定义边界时进入 waiting_for_input"
    }
  ],
  "outputs": [
    {
      "name": "current-task.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/current-task.json",
      "schema": "output.schema.json#current-task.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "design-contract.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/design-contract.json",
      "schema": "output.schema.json#design-contract.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "implementation-contract.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/implementation-contract.json",
      "schema": "output.schema.json#implementation-contract.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "quality-contract.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/quality-contract.json",
      "schema": "output.schema.json#quality-contract.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "open-questions.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/open-questions.json",
      "schema": "output.schema.json#open-questions.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "task-context.agent.md",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/task-context.agent.md",
      "schema": "output.schema.json#task-context.agent.md",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "workflow-trace.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/workflow-trace.json",
      "schema": "output.schema.json#workflow-trace.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "control-health-report.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/control-health-report.json",
      "schema": "output.schema.json#control-health-report.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "technology-adoption-report.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/technology-adoption-report.json",
      "schema": "output.schema.json#technology-adoption-report.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "rule-consumption-report.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/rule-consumption-report.json",
      "schema": "output.schema.json#rule-consumption-report.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    },
    {
      "name": "repair-attempts.json",
      "type": "markdown|json|yaml|code|log|report",
      "path": "artifacts/implementation-controller/repair-attempts.json",
      "schema": "output.schema.json#repair-attempts.json",
      "consumer": "workflow-orchestrator|downstream-stage|human-review"
    }
  ],
  "preconditions": [
    "必填输入已提供或已记录缺失处理策略",
    "风险策略已加载",
    "目标范围已明确"
  ],
  "execution_gates": {
    "language_confirmed": true,
    "preflight_required_information": true,
    "formal_document_metadata_required": true,
    "stage_result_validation_required": true,
    "block_when_agent_violates_contract": true
  },
  "required_information_policy": {
    "must_ask_when": [
      "必填输入缺失",
      "系统边界无法确认",
      "风险等级无法判断",
      "审批状态缺失",
      "无法基于仓库或上游产物可靠推导"
    ],
    "question_output": "required_information_requests",
    "blocking_status": "waiting_for_input",
    "human_review_html_required": true,
    "human_review_html_requirements": [
      "可填写每个待确认项",
      "保留问题 id 或稳定序号",
      "可复制或下载答案 JSON",
      "登记到 StageRunResult.artifacts",
      "HTML 路径必须位于目标项目 docs/human-review/",
      "agent 只消费 MD/JSON/YAML，不把 HTML 作为事实输入源"
    ],
    "minimum_question_fields": [
      "id",
      "question",
      "reason",
      "required",
      "priority",
      "expected_format"
    ],
    "question_order": [
      "critical",
      "major",
      "minor"
    ],
    "do_not_ask_when": "信息可从当前仓库、上游产物、明确 profile 或已确认上下文可靠获得时，不重复询问用户。"
  },
  "postconditions": [
    "全部输出产物已生成，或已输出明确的阻断结果",
    "质量门禁已评估",
    "需要人工审批的事项已列出"
  ],
  "dependencies": [
    "团队规范",
    "文档模板",
    "仓库上下文",
    "风险策略",
    "校验脚本"
  ],
  "permissions": {
    "allowed_actions": [
      "读取仓库文件",
      "生成产物",
      "运行确定性校验",
      "请求人工审批"
    ],
    "forbidden_actions": [
      "执行生产变更",
      "自动批准高风险动作",
      "隐藏失败检查",
      "覆盖无关工作"
    ]
  },
  "human_approval_required": [
    "修改已审批设计范围",
    "高风险实现豁免",
    "生产动作",
    "修复轮次耗尽后的人工决策"
  ],
  "risk_model": {
    "levels": [
      "low",
      "medium",
      "high",
      "critical"
    ],
    "upgrade_conditions": [
      "修改已审批设计范围",
      "高风险实现豁免",
      "生产动作",
      "修复轮次耗尽后的人工决策"
    ],
    "default_for_unknown": "medium"
  },
  "quality_gates": [
    {
      "gate_id": "implementation-controller-gate-1",
      "name": "设计合同已编译",
      "type": "deterministic",
      "pass_condition": "设计合同已编译 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "implementation-controller-gate-2",
      "name": "实现范围明确",
      "type": "deterministic",
      "pass_condition": "实现范围明确 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "implementation-controller-gate-3",
      "name": "质量命令非空",
      "type": "deterministic",
      "pass_condition": "质量命令非空 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "implementation-controller-gate-4",
      "name": "修复策略明确",
      "type": "deterministic",
      "pass_condition": "修复策略明确 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    },
    {
      "gate_id": "implementation-controller-gate-5",
      "name": "人工审阅包仅在阻断或最终审阅时生成",
      "type": "deterministic",
      "pass_condition": "人工审阅包仅在阻断或最终审阅时生成 有证据证明已满足",
      "fail_action": "block 或 require_human_review"
    }
  ],
  "failure_modes": [
    {
      "error_code": "MISSING_REQUIRED_INPUT",
      "condition": "必填输入不可用",
      "severity": "major",
      "recovery_strategy": "输出缺失信息产物并等待补充输入",
      "next_state": "waiting_for_input"
    },
    {
      "error_code": "INVALID_OUTPUT_SCHEMA",
      "condition": "输出无法按声明 schema 解析",
      "severity": "blocker",
      "recovery_strategy": "重新生成产物并再次运行校验器",
      "next_state": "failed"
    },
    {
      "error_code": "STAGE_RESULT_CONTRACT_VIOLATION",
      "condition": "StageRunResult 缺少语言、文档编号、主动问询或其他运行时门禁字段",
      "severity": "blocker",
      "recovery_strategy": "运行 validate_stage_run_result.py 并阻断违规节点",
      "next_state": "blocked"
    },
    {
      "error_code": "QUALITY_GATE_FAILED",
      "condition": "阻断门禁失败",
      "severity": "blocker",
      "recovery_strategy": "输出 findings 和 required actions",
      "next_state": "blocked"
    },
    {
      "error_code": "HUMAN_APPROVAL_REQUIRED",
      "condition": "风险策略要求人工审批",
      "severity": "major",
      "recovery_strategy": "创建 ApprovalRequest",
      "next_state": "waiting_for_human_review"
    }
  ],
  "eval_cases": [
    "happy_path",
    "missing_required_input",
    "ambiguous_input",
    "policy_conflict",
    "edge_case",
    "regression_case",
    "technology_demo_adoption",
    "control_plane_drift",
    "rule_consumption_gap",
    "context_noise_overload",
    "low_quality_automation"
  ],
  "workflow_interface": {
    "node_id": "implementation-controller",
    "input_artifacts": [
      "approved design artifact",
      "target project root",
      "project profile",
      "changed-files-report.json"
    ],
    "output_artifacts": [
      "current-task.json",
      "design-contract.json",
      "implementation-contract.json",
      "quality-contract.json",
      "open-questions.json",
      "task-context.agent.md",
      "workflow-trace.json",
      "control-health-report.json",
      "technology-adoption-report.json",
      "rule-consumption-report.json",
      "repair-attempts.json"
    ],
    "document_metadata": {
      "schema": "engineering-assistant/schemas/document-lifecycle.schema.json",
      "required_when": "status=succeeded and markdown artifact exists"
    },
    "required_information_requests": {
      "artifact": "artifacts/implementation-controller/required-information-request.json",
      "schema": "engineering-assistant/schemas/required-information-request.schema.json",
      "status_when_blocking": "waiting_for_input"
    },
    "state_transitions": [
      "pending",
      "running",
      "waiting_for_input",
      "waiting_for_human_review",
      "succeeded",
      "failed",
      "skipped",
      "blocked",
      "cancelled"
    ],
    "gate_decision": [
      "continue",
      "pause",
      "retry",
      "skip",
      "block",
      "stop"
    ],
    "retry_policy": {
      "max_attempts": 1,
      "retry_on": [
        "TOOL_UNAVAILABLE",
        "UNKNOWN_ERROR"
      ]
    }
  },
  "owner": "研发负责人",
  "reviewers": [
    "研发负责人",
    "架构师",
    "测试负责人"
  ],
  "change_policy": "contract、gate、schema 或审批规则变更必须经过 skill owner 评审，并通过 skill-quality-auditor",
  "control_surface_policy": {
    "required": true,
    "control_dir": "artifacts/_control",
    "source_of_truth": "approved Markdown/JSON/YAML design artifact",
    "html_policy": "HTML is human-only and cannot be consumed as agent source evidence",
    "required_artifacts": [
      "current-task.json",
      "design-contract.json",
      "implementation-contract.json",
      "quality-contract.json",
      "open-questions.json",
      "task-context.agent.md",
      "workflow-trace.json",
      "control-health-report.json",
      "technology-adoption-report.json",
      "rule-consumption-report.json",
      "repair-attempts.json"
    ],
    "bounded_repair": {
      "max_attempts": 2,
      "loop": [
        "review",
        "repair",
        "validate"
      ],
      "human_only_for": [
        "design conflict",
        "business decision",
        "high risk approval",
        "production action",
        "repair exhausted"
      ]
    }
  }
}
