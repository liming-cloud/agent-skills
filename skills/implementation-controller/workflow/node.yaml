{
  "node_id": "implementation-controller",
  "stage": "implementation_control",
  "skill_id": "implementation-controller",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "approved design artifact",
    "target project root",
    "project profile",
    "changed-files-report.json"
  ],
  "outputs": [
    "current-task.json",
    "design-contract.json",
    "implementation-contract.json",
    "quality-contract.json",
    "open-questions.json",
    "task-context.agent.md",
    "workflow-trace.json",
    "control-health-report.json",
    "technology-adoption-report.json",
    "rule-consumption-report.json",
    "repair-attempts.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "设计合同已编译",
    "实现范围明确",
    "质量命令非空",
    "修复策略明确",
    "人工审阅包仅在阻断或最终审阅时生成"
  ],
  "approval_policy": {
    "required_for": [
      "修改已审批设计范围",
      "高风险实现豁免",
      "生产动作",
      "修复轮次耗尽后的人工决策"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "current-task.json": "artifacts/implementation-controller/current-task.json",
    "design-contract.json": "artifacts/implementation-controller/design-contract.json",
    "implementation-contract.json": "artifacts/implementation-controller/implementation-contract.json",
    "quality-contract.json": "artifacts/implementation-controller/quality-contract.json",
    "open-questions.json": "artifacts/implementation-controller/open-questions.json",
    "task-context.agent.md": "artifacts/implementation-controller/task-context.agent.md",
    "workflow-trace.json": "artifacts/implementation-controller/workflow-trace.json",
    "control-health-report.json": "artifacts/implementation-controller/control-health-report.json",
    "technology-adoption-report.json": "artifacts/implementation-controller/technology-adoption-report.json",
    "rule-consumption-report.json": "artifacts/implementation-controller/rule-consumption-report.json",
    "repair-attempts.json": "artifacts/implementation-controller/repair-attempts.json"
  }
}
