{
  "node_id": "requirement-intake",
  "stage": "requirement_intake",
  "skill_id": "requirement-intake",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "organization_context",
    "current_process",
    "requirement_materials",
    "risk_policy"
  ],
  "outputs": [
    "requirement-intake-report.md",
    "requirement-contract.json",
    "missing-information-list.md",
    "requirement-risk-assessment.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "业务目标存在",
    "验收标准存在",
    "范围清晰",
    "高风险事项有 owner",
    "重大依赖已确认"
  ],
  "approval_policy": {
    "required_for": [
      "高风险需求",
      "跨系统重大依赖",
      "数据/权限/发布风险"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "requirement-intake-report.md": "artifacts/requirement-intake/requirement-intake-report.md",
    "requirement-contract.json": "artifacts/requirement-intake/requirement-contract.json",
    "missing-information-list.md": "artifacts/requirement-intake/missing-information-list.md",
    "requirement-risk-assessment.json": "artifacts/requirement-intake/requirement-risk-assessment.json"
  }
}
