display_name: "Release Verification"
short_description: "发布后验证核心功能、监控、日志、业务指标和回滚条件。"
default_prompt: "使用 release-verification，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: false
  risk_level: "high"
  human_approval_required:
    - "回滚操作"
    - "生产验证豁免"
    - "延长观察窗口"
metadata:
  owner: "SRE"
  stage: "release_verification"
  type: "stage_skill"
  trigger_description: "Use when the request is about 发布后验证核心功能、监控、日志、业务指标和回滚条件。；Do not use when 不执行未审批回滚；不忽略异常。"
routing:
  intent_tags:
    - "release"
    - "release-verification"
    - "release_verification"
    - "stage_skill"
    - "verification"
    - "业务指标和回滚条件。"
    - "发布后验证核心功能"
    - "日志"
    - "监控"
  allow_implicit_invocation: false
  cost_class: "high"
