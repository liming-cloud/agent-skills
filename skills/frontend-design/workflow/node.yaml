{
  "node_id": "frontend-design",
  "stage": "frontend_design",
  "skill_id": "frontend-design",
  "version": "1.0.0",
  "mode": "standalone|workflow",
  "entry_modes": [
    "auto_flow",
    "from_node",
    "single_node"
  ],
  "depends_on": [],
  "inputs": [
    "requirement-contract.json",
    "high-level-design.md",
    "interface-contracts.yaml",
    "repo_context"
  ],
  "outputs": [
    "frontend-design.md",
    "interaction-flow.md",
    "component-contracts.yaml",
    "frontend-risk-report.json"
  ],
  "preconditions": [
    "contract 输入可用",
    "风险策略已加载"
  ],
  "postconditions": [
    "StageRunResult 已输出",
    "产物已登记索引"
  ],
  "quality_gates": [
    "页面和组件边界明确",
    "接口联调契约明确",
    "加载/空态/错误态完整",
    "技术栈和组件库已确认"
  ],
  "approval_policy": {
    "required_for": [
      "前端技术栈变更",
      "公共组件改造",
      "影响核心客户端流程"
    ],
    "decision": [
      "pending",
      "approved",
      "rejected"
    ]
  },
  "retry_policy": {
    "max_attempts": 1,
    "retry_on": [
      "TOOL_UNAVAILABLE",
      "UNKNOWN_ERROR"
    ]
  },
  "failure_policy": {
    "block_on": [
      "QUALITY_GATE_FAILED",
      "RISK_POLICY_VIOLATION",
      "STAGE_RESULT_CONTRACT_VIOLATION"
    ],
    "pause_on": [
      "HUMAN_APPROVAL_REQUIRED",
      "MISSING_REQUIRED_INPUT"
    ]
  },
  "next_nodes": [],
  "artifact_mapping": {
    "frontend-design.md": "artifacts/frontend-design/frontend-design.md",
    "interaction-flow.md": "artifacts/frontend-design/interaction-flow.md",
    "component-contracts.yaml": "artifacts/frontend-design/component-contracts.yaml",
    "frontend-risk-report.json": "artifacts/frontend-design/frontend-risk-report.json"
  }
}
