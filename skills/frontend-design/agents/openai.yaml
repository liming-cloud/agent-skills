display_name: "Frontend Design"
short_description: "将需求和接口契约转化为可实现的前端设计，明确页面、组件、状态、交互、接口联调和验证策略。"
default_prompt: "使用 frontend-design，先确认输出语言和必须补充的信息，再基于输入材料执行本阶段任务，输出声明产物、findings、required actions 和 gate decision。"
language_policy:
  supported:
    - "zh-CN"
    - "en"
  when_unspecified: "ask_user"
  question: "请确认输出语言：简体中文还是 English？"
policy:
  allow_implicit_invocation: true
  risk_level: "medium"
  human_approval_required:
    - "前端技术栈变更"
    - "公共组件改造"
    - "影响核心客户端流程"
metadata:
  owner: "前端开发"
  stage: "frontend_design"
  type: "stage_skill"
  trigger_description: "Use when the request is about 将需求和接口契约转化为可实现的前端设计，明确页面、组件、状态、交互、接口联调和验证策略。；Do not use when 不替代产品原型评审；不直接修改后端接口。"
routing:
  intent_tags:
    - "design"
    - "frontend"
    - "frontend-design"
    - "frontend_design"
    - "stage_skill"
    - "交互"
    - "将需求和接口契约转化为可实现的前端设计"
    - "接口联调和验证策略。"
    - "明确页面"
    - "状态"
    - "组件"
  allow_implicit_invocation: true
  cost_class: "medium"
