{
  "name": "Codex 知识沉淀",
  "on": {
    "schedule": [
      {
        "cron": "0 1 * * 1"
      }
    ],
    "workflow_dispatch": {}
  },
  "permissions": {
    "contents": "read",
    "issues": "write"
  },
  "jobs": {
    "knowledge": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "name": "准备产物目录",
          "run": "python3 engineering-assistant/scripts/collect_ci_artifacts.py"
        },
        {
          "name": "校验 eval 覆盖",
          "run": "python3 engineering-assistant/scripts/run_skill_evals.py"
        }
      ]
    }
  }
}
