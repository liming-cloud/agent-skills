{
  "version": "1.0.0",
  "policies": [
    {
      "id": "deny-rm-rf",
      "match": {
        "regex": "\\brm\\s+-rf\\b"
      },
      "decision": "deny",
      "reason": "命中 rm -rf 高风险命令；请改走受控清理流程。"
    },
    {
      "id": "deny-git-push",
      "match": {
        "regex": "\\bgit\\s+push\\b"
      },
      "decision": "deny",
      "reason": "git push 前必须完成自动校验、评审和人工确认。"
    },
    {
      "id": "deny-git-commit",
      "match": {
        "regex": "\\bgit\\s+commit\\b"
      },
      "decision": "deny",
      "reason": "git commit 前必须完成自动校验、评审和人工确认。"
    },
    {
      "id": "deny-curl-pipe-shell",
      "match": {
        "regex": "\\bcurl\\b.*\\|\\s*sh\\b"
      },
      "decision": "deny",
      "reason": "禁止 curl | sh 形式的不可审计安装。"
    },
    {
      "id": "deny-repo-plugin-publish-dir-write",
      "match": {
        "regex": "(plugins/(engineering-assistant|teamwork-engineering-assistant)/.*(apply_patch|>\\s*|>>\\s*|write_text|open\\(|sed\\s+-i|perl\\s+-pi|cp\\s|mv\\s|rsync\\s|touch\\s|tee\\s))|((apply_patch|>\\s*|>>\\s*|write_text|open\\(|sed\\s+-i|perl\\s+-pi|cp\\s|mv\\s|rsync\\s|touch\\s|tee\\s).*plugins/(engineering-assistant|teamwork-engineering-assistant)/)"
      },
      "decision": "deny",
      "reason": "禁止在仓库内直接写插件发布目录；请修改生成器或源树后运行 publish_plugin.py 发布。"
    },
    {
      "id": "context-controlled-task",
      "match": {
        "contains": "run_controlled_task.py"
      },
      "decision": "allow",
      "reason": "受控自动化会串联控制面健康、技术采用度、规则消费和质量命令；失败必须写入 repair-attempts.json。"
    }
  ]
}
